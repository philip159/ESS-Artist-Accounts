<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLB Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      background: #000;
      border-bottom: 1px solid #333;
    }
    h1 {
      font-size: 18px;
      font-weight: 500;
    }
    .viewer-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    model-viewer {
      width: 100%;
      max-width: 900px;
      height: 70vh;
      background: #2a2a2a;
      border-radius: 12px;
      --poster-color: transparent;
    }
    .controls {
      padding: 16px 24px;
      background: #000;
      border-top: 1px solid #333;
      text-align: center;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>Frame Hanger GLB Viewer</h1>
  </header>
  
  <div class="viewer-container">
    <model-viewer
      src="/frame-hanger.glb"
      alt="Frame Hanger 3D Model"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      camera-orbit="45deg 55deg 2m"
    ></model-viewer>
  </div>
  
  <div class="controls">
    Drag to rotate | Scroll to zoom | Shift+drag to pan
  </div>
</body>
</html>
